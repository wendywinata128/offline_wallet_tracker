<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wallet.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="A premium offline-first personal wallet & expense tracker." />
    <title>Wallet Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Prevent theme flash: apply persisted theme before first paint.
      (function () {
        try {
          var raw = localStorage.getItem("wallet-tracker:v1");
          var mode = "system";
          if (raw) {
            var parsed = JSON.parse(raw);
            var data = null;
            if (parsed && parsed.profiles) {
              var active =
                parsed.profiles.find(function (p) {
                  return p.id === parsed.activeId;
                }) || parsed.profiles[0];
              data = active && active.data;
            } else if (parsed) {
              data = parsed.data || parsed;
            }
            mode = (data && data.settings && data.settings.appearance && data.settings.appearance.theme) || "system";
          }
          var dark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
